<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Formatador de Textos Legais (PDF)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
            color: #34495e;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            margin-bottom: 15px;
            gap: 10px; /* Espaçamento entre os botões */
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
            flex-grow: 1; /* Faz os botões dividirem o espaço igualmente */
        }
        .btn-format {
            background-color: #3498db;
            color: white;
        }
        .btn-format:hover {
            background-color: #2980b9;
        }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
        }
        .btn-copy:hover {
            background-color: #27ae60;
        }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }
        .btn-clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚖️ Formatador de Textos Legais</h1>
    <p class="subtitle">Cole o texto do PDF abaixo para remover quebras de página e corrigir a formatação.</p>

    <label for="inputText">Texto Original (Cole do PDF):</label>
    <textarea id="inputText" placeholder="Cole o texto aqui..."></textarea>

    <div class="button-group">
        <button class="btn-clear" onclick="limparTextos()">Limpar Tudo</button>
        <button class="btn-format" onclick="formatarTexto()">Formatar Texto</button>
        <button class="btn-copy" onclick="copiarTexto()">Copiar Resultado</button>
    </div>

    <label for="outputText">Texto Formatado:</label>
    <textarea id="outputText" placeholder="O resultado aparecerá aqui..." readonly></textarea>
</div>

<script>
    function formatarTexto() {
        let texto = document.getElementById('inputText').value;

        if (!texto.trim()) {
            alert("Por favor, cole um texto para formatar.");
            return;
        }

        // ETAPA 1: Limpeza Inicial
        let formatado = texto.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();

        // ETAPA 2: Artigos
        formatado = formatado.replace(/\s+(Art\.)/g, '\n\n$1');
        // Corrige falsos positivos em Artigos (ex: "no Art.")
        formatado = formatado.replace(/(,\s*|\b(?:no|nos|do|dos|ao|aos|o|os|e|§|§§)\s+)\n\n(Art\.)/gi, '$1$2');

        // ETAPA 3: Incisos
        formatado = formatado.replace(/\s+([IVXLCDM]+\s*-)/g, '\n$1');

        // ETAPA 4 e 5: Parágrafos
        formatado = formatado.replace(/\s+(§\s*\d+(?:º|°|o)?)/g, '\n$1');
        formatado = formatado.replace(/\s+(Parágrafo\s+único)/gi, '\n$1');

        // ETAPA 6: CORREÇÃO DE REMISSÕES
        // Se antes da quebra do parágrafo houver vírgula ou palavras de ligação, desfaz a quebra.
        // Cobre exemplos como: "art. 11, § 1º", "no § 2º", "do Parágrafo único"
        const regexRemissoes = /(,\s*|\b(?:no|nos|do|dos|ao|aos|o|os|e|art\.|arts\.|inciso|incisos)\s+)\n(§|Parágrafo\s+único)/gi;
        formatado = formatado.replace(regexRemissoes, '$1$2');

        document.getElementById('outputText').value = formatado;
    }

    function limparTextos() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
        document.getElementById('inputText').focus(); // Volta o cursor piscando para a primeira caixa
    }

    function copiarTexto() {
        let outputText = document.getElementById('outputText');
        
        if (!outputText.value.trim()) {
            alert("Não há texto formatado para copiar.");
            return;
        }

        outputText.select();
        outputText.setSelectionRange(0, 99999); 
        
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert("Texto copiado para a área de transferência!");
        }).catch(err => {
            alert("Erro ao copiar o texto: " + err);
        });
    }
</script>

</body>
</html>
