<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Formatador de Textos Legais (PDF)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
            transition: background-color 0.3s;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-top: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
            color: #34495e;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            margin-bottom: 15px;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
            font-weight: bold;
            flex-grow: 1;
        }
        button:hover {
            opacity: 0.9;
        }
        .btn-format {
            background-color: #3498db;
            color: white;
        }
        .btn-format:hover {
            background-color: #2980b9;
        }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
        }
        .btn-copy:hover {
            background-color: #27ae60;
        }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
        }
        .btn-clear:hover {
            background-color: #c0392b;
        }
        
        /* Estilo do botão de Tema */
        .btn-theme {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            flex-grow: 0;
        }

        /* === REGRAS DO TEMA ESCURO === */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-mode .container {
            background: #1e1e1e;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        body.dark-mode h1 { color: #ffffff; }
        body.dark-mode p.subtitle, body.dark-mode label { color: #b0bec5; }
        body.dark-mode textarea {
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-theme" id="themeToggle" onclick="alternarTema()" title="Alternar Tema Escuro">🌙</button>

    <h1>⚖️ Formatador de Textos Legais</h1>
    <p class="subtitle">Cole o texto do PDF abaixo para remover quebras de página e corrigir a formatação de Artigos, Incisos, Parágrafos e Alíneas.</p>

    <label for="inputText">Texto Original (Cole do PDF):</label>
    <textarea id="inputText" placeholder="Cole o texto aqui..."></textarea>

    <div class="button-group">
        <button class="btn-clear" onclick="limparTextos()">Limpar Tudo</button>
        <button class="btn-format" onclick="formatarTexto()">Formatar Texto</button>
        <button class="btn-copy" onclick="copiarTexto()">Copiar Resultado</button>
    </div>

    <label for="outputText">Texto Formatado:</label>
    <textarea id="outputText" placeholder="O resultado aparecerá aqui..." readonly></textarea>
</div>

<script>
    // === CARREGAR PREFERÊNCIA DE TEMA ===
    // Assim que a página carrega, verifica se o tema escuro estava ativo
    document.addEventListener('DOMContentLoaded', () => {
        const temaSalvo = localStorage.getItem('temaEscuro');
        const botaoTema = document.getElementById('themeToggle');
        
        if (temaSalvo === 'ativo') {
            document.body.classList.add('dark-mode');
            botaoTema.textContent = '☀️';
        }
    });

    // Função para Alternar e Salvar o Tema Escuro
    function alternarTema() {
        document.body.classList.toggle('dark-mode');
        let botao = document.getElementById('themeToggle');
        
        // Verifica se a classe dark-mode está presente agora
        if (document.body.classList.contains('dark-mode')) {
            botao.textContent = '☀️';
            localStorage.setItem('temaEscuro', 'ativo'); // Guarda a preferência
        } else {
            botao.textContent = '🌙';
            localStorage.setItem('temaEscuro', 'inativo'); // Remove a preferência
        }
    }

    function formatarTexto() {
        let texto = document.getElementById('inputText').value;

        if (!texto.trim()) {
            alert("Por favor, cole um texto para formatar.");
            return;
        }

        // ETAPA 1: Limpeza Inicial (transforma tudo num bloco só de texto)
        // 1º replace: Localiza todas as quebras de linha ou de página do PDF ([\r\n]+) e troca por um espaço.
        // 2º replace: Localiza qualquer sequência de espaços em branco duplos ou maiores (\s+) e reduz para um espaço só.
        // trim(): Remove espaços vazios que tenham sobrado no início ou no fim de todo o texto.
        let formatado = texto.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();

        // ETAPA 2: Quebrar Artigos (Dupla quebra para destaque)
        // Procura por espaços (\s+) seguidos exatamente pela palavra "Art."
        // O $1 captura o "Art." e o devolve acompanhado de duas quebras de linha (\n\n) para separá-lo do bloco anterior.
        formatado = formatado.replace(/\s+(Art\.)/g, '\n\n$1');

        // ETAPA 3: Quebrar Incisos (Algarismos romanos com hífen)
        // A classe [IVXLCDM]+ garante que ele encontre apenas letras romanas (uma ou mais vezes).
        // Em seguida, procura espaços opcionais (\s*) e o hífen obrigatório (-).
        formatado = formatado.replace(/\s+([IVXLCDM]+\s*-)/g, '\n\n$1');

        // ETAPA 4: Quebrar Parágrafos
        // O símbolo "|" significa "OU". Então ele procura:
        // Opção A: O símbolo §, seguido de espaços, números (\d+) e um indicador ordinal opcional (º, °, ou o).
        // Opção B: A frase "Parágrafo único".
        // O "i" no final (/gi) faz a busca ignorar se a letra está maiúscula ou minúscula (case-insensitive).
        formatado = formatado.replace(/\s+(§\s*\d+(?:º|°|o)?|Parágrafo\s+único)/gi, '\n\n$1');

        // ETAPA 5: Quebrar Alíneas (Letra minúscula seguida de parêntese, ex: a) b) c) )
        // Procura um espaço (\s+) seguido de exatamente uma letra de "a" até "z" ([a-z]), acompanhada do parêntese de fechamento \).
        // A barra invertida antes do parêntese é usada porque na Regex o parêntese puro serve para criar grupos, então o \ avisa que é texto literal.
        formatado = formatado.replace(/\s+([a-z]\))/g, '\n\n$1');

        // ETAPA 6: Quebrar Penas (comum em legislação penal/ambiental, ex: "Pena - " ou "Penas: ")
        // Procura a palavra Pena ou Penas, seguida de espaços opcionais e um hífen ou dois pontos.
        formatado = formatado.replace(/\s+(Pena(?:s)?\s*[-:])/gi, '\n\n$1');

        // ETAPA 7: CORREÇÃO INTELIGENTE DE REMISSÕES (A "Varredura Mágica")
        const regexRemissoes = /(,\s*|\b(?:no|nos|na|nas|do|dos|da|das|ao|aos|à|às|o|os|a|as|e|ou|inciso|incisos|alínea|alíneas|caput|sob)\b|\b(?:art\.|arts\.)|§§?)\n+(Art\.|[IVXLCDM]+\s*-|§|Parágrafo\s+único|[a-z]\)|Pena(?:s)?\s*[-:])/gi;
        
        let temp = "";
        while (temp !== formatado) {
            temp = formatado;
            formatado = formatado.replace(regexRemissoes, (match, p1, p2) => {
                return p1.trim() + ' ' + p2;
            });
        }

        document.getElementById('outputText').value = formatado;
    }

    function limparTextos() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
        document.getElementById('inputText').focus();
    }

    function copiarTexto() {
        let outputText = document.getElementById('outputText');
        
        if (!outputText.value.trim()) {
            alert("Não há texto formatado para copiar.");
            return;
        }

        outputText.select();
        outputText.setSelectionRange(0, 99999); 
        
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert("Texto copiado para a área de transferência!");
        }).catch(err => {
            alert("Erro ao copiar o texto: " + err);
        });
    }
</script>

</body>
</html>
