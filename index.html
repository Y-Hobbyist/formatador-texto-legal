<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Formatador de Textos Legais (PDF)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
            color: #34495e;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .btn-format {
            background-color: #3498db;
            color: white;
            flex-grow: 1;
            margin-right: 10px;
        }
        .btn-format:hover {
            background-color: #2980b9;
        }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
        }
        .btn-copy:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚖️ Formatador de Textos Legais</h1>
    <p class="subtitle">Cole o texto do PDF abaixo para remover quebras de página e corrigir a formatação de Artigos, Incisos e Parágrafos.</p>

    <label for="inputText">Texto Original (Cole do PDF):</label>
    <textarea id="inputText" placeholder="Cole o texto aqui..."></textarea>

    <div class="button-group">
        <button class="btn-format" onclick="formatarTexto()">Formatar Texto</button>
        <button class="btn-copy" onclick="copiarTexto()">Copiar Resultado</button>
    </div>

    <label for="outputText">Texto Formatado:</label>
    <textarea id="outputText" placeholder="O resultado aparecerá aqui..." readonly></textarea>
</div>

<script>
    function formatarTexto() {
        let texto = document.getElementById('inputText').value;

        if (!texto.trim()) {
            alert("Por favor, cole um texto para formatar.");
            return;
        }

        // ETAPA 1: Substituir quebras de linha por espaços e remover espaços múltiplos
        let formatado = texto.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();

        // ETAPA 2: Inserir quebra de linhas entre artigos
        // Procura por " Art." e insere duas quebras de linha para destacar bem
        formatado = formatado.replace(/\s+(Art\.)/g, '\n\n$1');

        // ETAPA 3: Inserir quebra de linha entre incisos (I - , II - , ..., CD - )
        // Procura algarismos romanos seguidos de hífen
        formatado = formatado.replace(/\s+([IVXLCDM]+\s*-)/g, '\n$1');

        // ETAPA 4 e 5: Inserir quebra de linha entre parágrafos (com ou sem º)
        // Cobre § 1º, § 10, etc (o ?:º|°|o lida com diferentes tipos de "bolinhas" de grau)
        formatado = formatado.replace(/\s+(§\s*\d+(?:º|°|o)?)/g, '\n$1');
        
        // Bônus: Quebra de linha para Parágrafo único
        formatado = formatado.replace(/\s+(Parágrafo\s+único)/gi, '\n$1');

        document.getElementById('outputText').value = formatado;
    }

    function copiarTexto() {
        let outputText = document.getElementById('outputText');
        
        if (!outputText.value.trim()) {
            alert("Não há texto formatado para copiar.");
            return;
        }

        outputText.select();
        outputText.setSelectionRange(0, 99999); // Para dispositivos móveis
        
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert("Texto copiado para a área de transferência!");
        }).catch(err => {
            alert("Erro ao copiar o texto: " + err);
        });
    }
</script>

</body>
</html>
